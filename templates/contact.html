
{% extends "base.html" %}
{% block title %}Contact Page{% endblock title %}
{% block body %}
<div class="container-fluid px-0">
    <img src="https://unsplash.com/assets/api/api-photo-grid@2x-388d83e210e483af53295e6574d71e343557875502b68b56b3cf0e1c0040b440.jpg" class="d-block w-100 px-o" alt="...">
    <h1 class="text-center">Contact Us</h1>
</div>
    <div class="container md-3">
        <form method="post" action="/contact">
            {% csrf_token %}
            <div class="form-group row">
                <label for="name">Enter Your Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="">
            </div>
            <div class="form-group">
                <label for="staticEmail">Enter Your Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="">
            </div>
            <div class="form-group">
                <label for="staticEmail">Enter Your Phone Number</label>
                    <input type="number" class="form-control" id="phone" name="phone" value="">
            </div>
            <div class="form-group">
                <label for="desc">Tell me about what you want to contact me for...</label>
                    <textarea class="form-control" id="desc" rows="3" name="desc"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
{% endblock body %}
